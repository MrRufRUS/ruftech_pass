version: '3.8'

services:
  db:
    image: postgres:16
    container_name: ruftech_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ruftech-pass
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ruftech_migrations
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${DATABASE_PASSWORD:-postgres}:${DATABASE_PORT:-5432}/ruftech-pass
    command: alembic upgrade head
    volumes:
      - .:/app

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ruftech_app
    depends_on:
      migrations:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:${DATABASE_PASSWORD:-postgres}:${DATABASE_PORT:-5432}/ruftech-pass
    ports:
      - "8000:8000"

volumes:
  postgres_data:
