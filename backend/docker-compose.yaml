version: "3.8"

services:

  db:
    image: postgres:16
    container_name: ruftech_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-ruftech-pass}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ruftech_migrations
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@db:5432/${DATABASE_NAME:-ruftech-pass}
    command: sh -c "uv run alembic upgrade head"
    volumes:
      - .:/app
      - ./certs:/app/certs

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ruftech_app
    depends_on:
      migrations:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-postgres}:${DATABASE_PASSWORD:-postgres}@db:5432/${DATABASE_NAME:-ruftech-pass}
    ports:
      - "8000:8000"
    volumes:
      - ./certs:/app/certs
    command: >
      sh -c "
      cd app &&
      uv run uvicorn main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data:
