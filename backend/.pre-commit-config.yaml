repos:
  # Базовые проверки
  - repo: local
    hooks:
      - id: uv-export-requirements
        name: Export requirements.txt
        entry: uv export --format requirements-txt -o requirements.txt
        language: system
        pass_filenames: false
        files: ^pyproject\.toml$
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: debug-statements

  # Ruff (линтер + автофиксы)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.7
    hooks:
      - id: ruff
        args: [--fix]

      - id: ruff-format

  # Обновление синтаксиса Python
  - repo: https://github.com/asottile/pyupgrade
    rev: v3.17.0
    hooks:
      - id: pyupgrade
        args: [--py311-plus]

  # Сортировка imports (иногда всё ещё используют отдельно)
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]
