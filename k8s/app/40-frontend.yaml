apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ruftech-pass
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend }
  template:
    metadata:
      labels: { app: frontend }
    spec:
      containers:
        - name: frontend
          image: vzhyx/ruftech-frontend:v1.7.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ruftech-pass
spec:
  type: LoadBalancer
  ports:
    - port: 8090
      targetPort: 80
  selector: { app: frontend }