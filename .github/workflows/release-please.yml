name: Release Please

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────
  # 1. Создание/обновление Release PR и тега
  # ─────────────────────────────────────────────
  release-please:
    name: Release Please
    # Запускаемся только если CI на master завершился успехом.
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # ─────────────────────────────────────────────
  # 2. Публикация Docker-образов при создании релиза
  # ─────────────────────────────────────────────
  docker-publish:
    name: Публикация Docker-образов
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Вход в Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Сборка и публикация образа бэкенда
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker build -t $DOCKERHUB_USERNAME/ruftech-backend:$TAG ./backend
          docker tag $DOCKERHUB_USERNAME/ruftech-backend:$TAG $DOCKERHUB_USERNAME/ruftech-backend:latest
          docker push $DOCKERHUB_USERNAME/ruftech-backend:$TAG
          docker push $DOCKERHUB_USERNAME/ruftech-backend:latest

      - name: Сборка и публикация образа фронтенда
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          docker build -t $DOCKERHUB_USERNAME/ruftech-frontend:$TAG ./frontend -f ./frontend/apps/pass/Dockerfile
          docker tag $DOCKERHUB_USERNAME/ruftech-frontend:$TAG $DOCKERHUB_USERNAME/ruftech-frontend:latest
          docker push $DOCKERHUB_USERNAME/ruftech-frontend:$TAG
          docker push $DOCKERHUB_USERNAME/ruftech-frontend:latest

  # ─────────────────────────────────────────────
  # 3. GitOps: обновление тегов в k8s-манифестах
  #    ArgoCD заметит diff и сам выкатит новую версию в кластер
  # ─────────────────────────────────────────────
  update-manifests:
    name: GitOps-bump тегов в k8s-манифестах
    needs: [release-please, docker-publish]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
      # Чекаут с PAT, чтобы коммит пошёл от имени release-bot
      # и при необходимости мог триггерить workflow
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          # Без fetch-depth полная история не нужна, default ок

      - name: Настройка git
        run: |
          git config user.name  "release-please-bot"
          git config user.email "release-please-bot@users.noreply.github.com"

      - name: Обновление образа бэкенда в манифесте
        run: |
          sed -i "s|image: vzhyx/ruftech-backend:.*|image: vzhyx/ruftech-backend:${TAG}|g" k8s/app/30-backend.yaml

      - name: Обновление образа фронтенда в манифесте
        run: |
          sed -i "s|image: vzhyx/ruftech-frontend:.*|image: vzhyx/ruftech-frontend:${TAG}|g" k8s/app/40-frontend.yaml

      - name: Проверка изменений
        run: |
          echo "=== Backend ==="
          grep -n "image:" k8s/app/30-backend.yaml
          echo "=== Frontend ==="
          grep -n "image:" k8s/app/40-frontend.yaml
          echo "=== git diff ==="
          git diff --stat

      - name: Коммит и пуш bump'а
        run: |
          if git diff --quiet; then
            echo "Манифесты уже актуальны, коммит не требуется"
            exit 0
          fi
          git add k8s/app/30-backend.yaml k8s/app/40-frontend.yaml
          git commit -m "chore(deploy): bump images to ${TAG}

          Automated tag bump after release ${TAG}.
          ArgoCD will detect the diff and sync the cluster."
          git push origin master
