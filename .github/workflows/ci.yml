name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Линтинг
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/frontend-setup
      - run: pnpm turbo lint

  build:
    name: Сборка
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/frontend-setup
      - run: pnpm turbo build

  test:
    name: Тесты
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/frontend-setup
      - run: pnpm turbo test:coverage

      - name: Сводка покрытия
        if: always()
        run: node scripts/coverage-summary.js

      - name: Комментарий с покрытием в PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage
          path: frontend/coverage-report.md

      - name: Загрузка отчёта о покрытии
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/**/coverage/
          retention-days: 7
