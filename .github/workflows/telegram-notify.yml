name: Telegram Notify

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Set error message if workflow failed
        if: failure()
        run: echo "TELEGRAM_ERROR=Ошибка в workflow. Проверьте логи." >> $GITHUB_ENV

      - name: Send Telegram notification
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ vars.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            📢 GitHub Actions уведомление
            Репозиторий: ${{ github.repository }}
            Событие: ${{ github.event_name }}
            Ветка: ${{ github.ref_name }}
            Коммит: ${{ github.sha }}
            Статус CI/CD: ${{ job.status }}
            Ошибка: ${{ env.TELEGRAM_ERROR || 'Нет ошибок' }}
