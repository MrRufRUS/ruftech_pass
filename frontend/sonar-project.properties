sonar.projectKey=ruftech-pass-frontend
sonar.projectName=RufTECH Pass Frontend

# Источники — все пакеты и приложения
sonar.sources=apps,packages

# Тесты лежат в тех же папках, фильтруем включениями
sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Слитый lcov от merge-coverage.js
sonar.javascript.lcov.reportPaths=coverage-all/lcov.info

# Не анализируем
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/coverage-all/**,**/.turbo/**,**/storybook-static/**,**/*.config.ts,**/*.config.js,**/*.config.mjs,**/routeTree.gen.ts,**/*.d.ts,**/*.stories.tsx,**/*.stories.ts,scripts/**,packages/e2e/**

# Не считаем в coverage
sonar.coverage.exclusions=**/*.test.*,**/*.spec.*,**/*.stories.*,**/routeTree.gen.ts,**/main.tsx,**/entry-server.tsx,**/routes/**,**/test-setup.ts,**/test-utils.tsx,**/index.ts,**/*.config.*,scripts/**

sonar.sourceEncoding=UTF-8